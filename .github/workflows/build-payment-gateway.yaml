name: Build Payment Gateway

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - .github/workflows/build-payment-gateway.yaml
      - gradle/**
      - payment-gateway-application/**
      - payment-gateway-domain/**
      - payment-gateway-adapter-acquiring-bank/**
      - gradlew
      - settings.gradle.kts
  push:
    branches: [ main ]
    paths:
      - .github/workflows/build-payment-gateway.yaml
      - gradle/**
      - payment-gateway-application/**
      - payment-gateway-domain/**
      - payment-gateway-adapter-acquiring-bank/**
      - gradlew
      - settings.gradle.kts

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Payment Gateway
        uses: actions/checkout@v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: corretto
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5.0.2

      - name: Build Payment Gateway
        shell: bash
        run: ./gradlew build
